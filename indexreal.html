<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
  <a-scene mindar-image="imageTargetSrc: targets6.mind;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="model1" src="assets/bee-gltf/dotood.glb"></a-asset-item>
      <a-asset-item id="model2" src="assets/bee-gltf/4.glb"></a-asset-item>
      <a-asset-item id="model3" src="assets/bee-gltf/5.glb"></a-asset-item>
      <a-asset-item id="model4" src="assets/bee-gltf/6.glb"></a-asset-item>
    </a-assets>

    <!-- Камера + cursor -->
    <a-camera position="0 0 0" look-controls="enabled: false">
      <a-cursor fuse="false" raycaster="objects: .clickable"></a-cursor>
    </a-camera>

    <!-- Image target -->
    <a-entity mindar-image-target="targetIndex: 0" id="targetEntity">

      <!-- Text + Background Frame -->
      <a-entity id="textContainer" position="0 0.3 0.3" visible="false">
        <a-plane id="textBg" width="0.8" height="0.6" color="#333333" opacity="0.7" position="1 0 0"></a-plane>
        <a-text id="welcomeText" value="" align="center" color="#FFD700" width="2" position="1 0 0.01"></a-text>
      </a-entity>

      <!-- Models -->
      <a-gltf-model class="clickable" id="gltf1" src="#model1" position="0 0 0.3" scale="0.005 0.005 0.005"
        visible="false"></a-gltf-model>

      <a-gltf-model class="clickable" id="gltf2" src="#model2" position="0 0 0.3" scale="0.005 0.005 0.005"
        visible="false"></a-gltf-model>

      <a-gltf-model class="clickable" id="gltf3" src="#model3" position="0 0 0.3" scale="0.005 0.005 0.005"
        visible="false"></a-gltf-model>

      <a-gltf-model class="clickable" id="gltf4" src="#model4" position="0 0 0.3" scale="0.005 0.005 0.005"
        visible="false"></a-gltf-model>

    </a-entity>

    <!-- Доод товчлуурууд -->
    <div style="position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 999;">
      <button onclick="showModel(1)">1</button>
      <button onclick="showModel(2)">2</button>
      <button onclick="showModel(3)">3</button>
      <button onclick="showModel(4)">4</button>
    </div>

    <!-- Зураг харагдах элемент -->
    <img id="modelImage" src="" style="position: fixed; bottom: 120px; left: 40%; transform: translateX(-50%);
      max-width: 150px; border: 3px solid #FFD700; display: none; z-index: 999;" onclick="toggleText()" />

    <!-- Эргүүлэх товч -->
    <div id="rotateBtn" style="position: fixed; top: 10px; right: 10px; z-index: 999;
      padding: 10px 15px; background: #FFD700; border-radius: 5px;
      cursor: pointer; font-weight: bold;">
      Rotate
    </div>

    <script>
      const models = [
        document.querySelector('#gltf1'),
        document.querySelector('#gltf2'),
        document.querySelector('#gltf3'),
        document.querySelector('#gltf4')
      ];

      const modelImages = [
        'assets/1.jpg',
        'assets/2.jpg',
        'assets/4.jpg',
        'assets/3.jpg',
      ];

      const modelTexts = [
        "Hunii biy",
        "Arag ys",
        "Tsusan hangamj",
        "Bulchin",
      ];

      const targetEl = document.querySelector('#targetEntity');
      const imgEl = document.querySelector('#modelImage');
      const textContainer = document.querySelector('#textContainer');
      const welcomeText = document.querySelector('#welcomeText');

      let currentModel = null;
      let rotating = false;
      let imgVisible = false;
      let currentIndex = null;
      let textVisible = false;

      // Target олдсон үед
      targetEl.addEventListener('targetFound', () => {
        models.forEach(model => model.setAttribute('visible', 'false'));
        currentModel = null;
        rotating = false;
        imgEl.style.display = 'none';
        imgVisible = false;
        textVisible = false;
        textContainer.setAttribute('visible', 'false');
      });

      // Target алдсан үед
      targetEl.addEventListener('targetLost', () => {
        models.forEach(model => {
          model.setAttribute('visible', 'false');
          model.removeAttribute('animation');
        });
        currentModel = null;
        rotating = false;
        imgEl.style.display = 'none';
        imgVisible = false;
        textVisible = false;
        textContainer.setAttribute('visible', 'false');
      });

      function showModel(index) {
        models.forEach(model => {
          model.setAttribute('visible', 'false');
          model.removeAttribute('animation');
        });

        currentModel = models[index - 1];
        currentModel.setAttribute('visible', 'true');
        rotating = false;

        if (imgVisible && currentIndex === index) {
          imgEl.style.display = 'none';
          imgVisible = false;
        } else {
          imgEl.src = modelImages[index - 1];
          imgEl.style.display = 'block';
          imgVisible = true;
          currentIndex = index;
          textVisible = false;
          textContainer.setAttribute('visible', 'false');
        }
      }

      // Rotate товч
      document.querySelector('#rotateBtn').addEventListener('click', () => {
        if (!currentModel) return;

        if (rotating) {
          currentModel.removeAttribute('animation');
          rotating = false;
        } else {
          currentModel.setAttribute(
            'animation',
            'property: rotation; to: 0 360 0; loop: true; dur: 3000'
          );
          rotating = true;
        }
      });

      // Зурганд дарсан үед текст toggle хийх функц
      function toggleText() {
        if (currentIndex === null) return;

        if (textVisible) {
          textContainer.setAttribute('visible', 'false');
          textVisible = false;
        } else {
          welcomeText.setAttribute('value', modelTexts[currentIndex - 1]);
          textContainer.setAttribute('visible', 'true');
          textVisible = true;
        }
      }
    </script>
  </a-scene>
</body>

</html>
