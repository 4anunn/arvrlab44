<!DOCTYPE html>
<html lang="mn">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta charset="UTF-8" />
  <title>AR — Surface</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      font-family: 'Helvetica Neue', sans-serif;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #three-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #touch-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      transition: opacity 0.7s;
    }

    #loading.fade {
      opacity: 0;
      pointer-events: none;
    }

    .spin {
      width: 48px;
      height: 48px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-top-color: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    #load-msg {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.14em;
    }

    /* ── Scan phase UI ── */
    #scan-ui {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #scan-ui.hidden {
      opacity: 0;
    }

    /* Grid overlay — гадаргуу хайж байгааг илэрхийлэх */
    #grid-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.35;
    }

    #scan-label {
      position: absolute;
      left: 50%;
      bottom: 140px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 99px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .scan-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #facc15;
      animation: sdot 1.2s ease-in-out infinite;
    }

    @keyframes sdot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: 0.3;
        transform: scale(0.7)
      }
    }

    #scan-label span {
      font-size: 0.62rem;
      color: #fff;
      letter-spacing: 0.1em;
    }

    /* Reticle */
    #reticle {
      position: absolute;
      left: 50%;
      top: 58%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 70px;
      border: 1.5px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      animation: reticle 2s ease-in-out infinite;
    }

    #reticle::before,
    #reticle::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 14px;
      height: 1.5px;
      background: rgba(255, 255, 255, 0.5);
      transform: translateY(-50%);
    }

    #reticle::before {
      left: -18px
    }

    #reticle::after {
      right: -18px
    }

    @keyframes reticle {

      0%,
      100% {
        transform: translate(-50%, -50%) scaleX(1);
        opacity: 0.6
      }

      50% {
        transform: translate(-50%, -50%) scaleX(1.06);
        opacity: 1
      }
    }

    /* ── Placed UI ── */
    #placed-ui {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s;
    }

    #placed-ui.show {
      opacity: 1;
    }

    /* Top pill */
    #top-pill {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 99px;
      padding: 7px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }

    #top-pill span {
      font-size: 0.62rem;
      color: #fff;
      letter-spacing: 0.07em;
    }

    #readout {
      position: absolute;
      top: 54px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Courier New', monospace;
      font-size: 0.52rem;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* Touch hint */
    #touch-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
    }

    #touch-hint.show {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fout 0.4s ease 2.8s forwards;
    }

    @keyframes fout {
      to {
        opacity: 0
      }
    }

    .hbg {
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 14px 20px;
      display: flex;
      gap: 20px;
    }

    .hi {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .hi span:first-child {
      font-size: 1.4rem;
    }

    .hi span:last-child {
      font-size: 0.5rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.06em;
      text-align: center;
    }

    /* Controls */
    #controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 14px 30px;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.82) 0%, transparent 100%);
      pointer-events: all;
    }

    #model-tabs {
      display: flex;
      gap: 7px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .model-tab {
      flex: 1;
      max-width: 80px;
      padding: 8px 0;
      text-align: center;
      border-radius: 99px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .model-tab.active {
      background: #fff;
      color: #000;
      border-color: #fff;
      font-weight: 700;
    }

    #action-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .ctrl-btn {
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    .ctrl-btn.on {
      background: rgba(250, 204, 21, 0.18);
      border-color: rgba(250, 204, 21, 0.5);
      color: #facc15;
    }

    /* Thumbnail */
    #thumb-img {
      position: absolute;
      bottom: 118px;
      right: 14px;
      width: 66px;
      height: 66px;
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.22);
      object-fit: cover;
      display: none;
      cursor: pointer;
      pointer-events: all;
    }

    #info-panel {
      position: absolute;
      bottom: 188px;
      left: 14px;
      right: 14px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 13px 15px;
      display: none;
    }

    #info-panel h3 {
      color: #facc15;
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    #info-panel p {
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.6rem;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="three-canvas"></canvas>
  <canvas id="grid-canvas"></canvas>
  <div id="touch-layer"></div>

  <!-- Loading -->
  <div id="loading">
    <div class="spin"></div>
    <div id="load-msg">Камер нээж байна…</div>
  </div>

  <!-- Scan UI -->
  <div id="scan-ui">
    <div id="reticle"></div>
    <div id="scan-label">
      <div class="scan-dot"></div>
      <span id="scan-msg">Камерыг ширээ рүү аажуухан чиглүүлнэ үү</span>
    </div>
  </div>

  <!-- Placed UI -->
  <div id="placed-ui">
    <div id="top-pill">
      <div class="live-dot"></div>
      <span>Гадаргуу дээр байрласан</span>
    </div>
    <div id="readout"></div>

    <div id="touch-hint">
      <div class="hbg">
        <div class="hi"><span>☝️</span><span>DRAG<br />Эргүүлэх</span></div>
        <div class="hi"><span>🤏</span><span>PINCH<br />Zoom</span></div>
        <div class="hi"><span>✌️</span><span>2-DRAG<br />Шилжүүлэх</span></div>
      </div>
    </div>

    <img id="thumb-img" src="" onclick="toggleInfo()" />
    <div id="info-panel">
      <h3 id="info-title"></h3>
      <p id="info-desc"></p>
    </div>

    <div id="controls">
      <div id="model-tabs">
        <button class="model-tab active" onclick="switchModel(0)">1</button>
        <button class="model-tab" onclick="switchModel(1)">2</button>
        <button class="model-tab" onclick="switchModel(2)">3</button>
        <button class="model-tab" onclick="switchModel(3)">4</button>
      </div>
      <div id="action-row">
        <button class="ctrl-btn" id="auto-btn" onclick="toggleAuto()">⟳ Авто</button>
        <button class="ctrl-btn" id="reset-btn" onclick="resetAll()">↺ Reset</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    // ═══════════════════════════════════════
    //  Config
    // ═══════════════════════════════════════
    const MODELS = [
      { url: 'assets/bee-gltf/dotood.glb', name: 'Хүний бие', desc: 'Хүний биеийн бүтэц, эрхтэн тогтолцоо', img: 'assets/1.jpg', scale: 0.9 },
      { url: 'assets/bee-gltf/4.glb', name: 'Яс', desc: 'Аrag ясны тогтолцоо, холбоос, үений бүтэц', img: 'assets/2.jpg', scale: 0.9 },
      { url: 'assets/bee-gltf/5.glb', name: 'Цусан хангамж', desc: 'Судасны систем, зүрх, цусны эргэлт', img: 'assets/4.jpg', scale: 0.9 },
      { url: 'assets/bee-gltf/6.glb', name: 'Булчин', desc: 'Булчингийн бүлгүүд, хөдөлгөөний механизм', img: 'assets/3.jpg', scale: 0.9 },
    ];

    // ═══════════════════════════════════════
    //  Three.js
    // ═══════════════════════════════════════
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    const sun = new THREE.DirectionalLight(0xfff5e0, 1.5);
    sun.position.set(1.5, 4, 2);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 0.1;
    sun.shadow.camera.far = 20;
    sun.shadow.camera.left = sun.shadow.camera.bottom = -3;
    sun.shadow.camera.right = sun.shadow.camera.top = 3;
    sun.shadow.bias = -0.0005;
    scene.add(sun);

    scene.add(Object.assign(new THREE.PointLight(0xc8d8ff, 0.5), { position: new THREE.Vector3(-2, 2, -1) }));
    scene.add(Object.assign(new THREE.DirectionalLight(0xffffff, 0.25), { position: new THREE.Vector3(0, -1, -2) }));

    // ── Surface group (гадаргуу + model) ──
    const surfaceGroup = new THREE.Group();
    scene.add(surfaceGroup);

    // Shadow receiver plane
    const shadowPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 6),
      new THREE.ShadowMaterial({ opacity: 0.35 })
    );
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.receiveShadow = true;
    surfaceGroup.add(shadowPlane);

    // AO ring (model-ийн доор)
    const aoRing = new THREE.Mesh(
      new THREE.CircleGeometry(0.55, 64),
      new THREE.MeshBasicMaterial({
        color: 0x000000,
        transparent: true,
        opacity: 0.22,
        depthWrite: false
      })
    );
    aoRing.rotation.x = -Math.PI / 2;
    aoRing.position.y = 0.001;
    surfaceGroup.add(aoRing);

    // Subtle grid lines (гадаргуу мэдрэмж)
    const gridHelper = new THREE.GridHelper(3, 12, 0xffffff, 0xffffff);
    gridHelper.material.opacity = 0.06;
    gridHelper.material.transparent = true;
    gridHelper.position.y = 0.001;
    surfaceGroup.add(gridHelper);

    // Model pivot
    const pivot = new THREE.Group();
    pivot.position.y = 0; // гадаргуу дээр байна
    surfaceGroup.add(pivot);

    // ═══════════════════════════════════════
    //  State
    // ═══════════════════════════════════════
    let placed = false;   // гадаргуу тодорхойлогдсон уу
    let currentIdx = 0;
    let autoOn = false;
    let autoRafId = null;
    let infoVisible = false;
    const loadedModels = {};

    const tr = { rotX: 0, rotY: 0, scale: 1, posX: 0, posY: 0 };

    // Gyro data
    const gyro = { beta: 45, gamma: 0, alpha: 0 };
    let gyroReady = false;
    let confidence = 0;
    const gyroHistory = [];

    // Camera world position (gyro-оор тооцоолно)
    const camPos = new THREE.Vector3(0, 1.5, 2.5);
    const camTarget = new THREE.Vector3(0, 0, 0);

    // ═══════════════════════════════════════
    //  Camera stream
    // ═══════════════════════════════════════
    async function startCamera() {
      const video = document.getElementById('video');
      const constraints = [
        { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false },
        { video: { facingMode: 'user' }, audio: false },
        { video: true, audio: false }
      ];
      for (const c of constraints) {
        try {
          video.srcObject = await navigator.mediaDevices.getUserMedia(c);
          await video.play();
          // Арын камер бол mirror хэрэггүй
          if (c.video?.facingMode === 'environment') video.style.transform = 'none';
          return true;
        } catch (e) { continue; }
      }
      return false;
    }

    // ═══════════════════════════════════════
    //  DeviceOrientation — gyro
    // ═══════════════════════════════════════
    function startGyro() {
      const handler = (e) => {
        gyro.beta = e.beta ?? 45;
        gyro.gamma = e.gamma ?? 0;
        gyro.alpha = e.alpha ?? 0;
        gyroReady = true;
        updateConfidence();
      };

      if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS 13+
        DeviceOrientationEvent.requestPermission()
          .then(s => { if (s === 'granted') window.addEventListener('deviceorientation', handler); })
          .catch(() => { });
      } else {
        window.addEventListener('deviceorientation', handler);
      }
    }

    function updateConfidence() {
      // beta ~ 60-100 → камер доош → гадаргуу харж байна
      const ideal = Math.abs(gyro.beta - 80);
      const c = Math.max(0, Math.min(100, 100 - ideal * 1.8));
      gyroHistory.push(c);
      if (gyroHistory.length > 15) gyroHistory.shift();
      confidence = gyroHistory.reduce((a, b) => a + b, 0) / gyroHistory.length;

      if (!placed && confidence > 50) {
        placeSurface();
      }

      // Scan hint шинэчлэх
      if (!placed) {
        const msg = confidence > 50 ? 'Гадаргуу илрүүллээ…' :
          confidence > 25 ? 'Арай доош чиглүүлнэ үү' :
            'Камерыг ширээ рүү чиглүүлнэ үү';
        document.getElementById('scan-msg').textContent = msg;
        // Grid animation brightness
        gridHelper.material.opacity = 0.04 + confidence * 0.0012;
      }
    }

    // ═══════════════════════════════════════
    //  Place surface
    // ═══════════════════════════════════════
    function placeSurface() {
      if (placed) return;
      placed = true;

      document.getElementById('scan-ui').classList.add('hidden');
      setTimeout(() => document.getElementById('scan-ui').style.display = 'none', 600);

      document.getElementById('placed-ui').classList.add('show');

      const hint = document.getElementById('touch-hint');
      hint.classList.add('show');
      setTimeout(() => hint.classList.remove('show'), 3200);

      // Model ачаалах
      loadModel(currentIdx);
    }

    // ═══════════════════════════════════════
    //  Gyro → camera position (Apple AR шиг)
    //  Утас хөдлөхөд камер хөдлөж, model тогтвортой байна
    // ═══════════════════════════════════════
    function updateCameraFromGyro() {
      if (!gyroReady) return;

      // beta: 0=horizontal, 90=vertical
      // gamma: left-right tilt
      const betaRad = THREE.MathUtils.degToRad(gyro.beta);
      const gammaRad = THREE.MathUtils.degToRad(gyro.gamma);

      // Камерын байрлал — гадаргуунаас дээш
      const dist = 2.2;
      const height = Math.max(0.3, Math.sin(betaRad) * dist);
      const depth = Math.cos(betaRad) * dist;
      const side = Math.sin(gammaRad) * dist * 0.5;

      // Smooth interpolation
      camPos.lerp(new THREE.Vector3(side, height, depth), 0.08);

      camera.position.copy(camPos);
      camera.lookAt(camTarget);

      // Sun direction нь камертай хамт хөдлөх → realistic
      sun.position.set(camPos.x + 1.5, camPos.y + 2, camPos.z + 1);
    }

    // ═══════════════════════════════════════
    //  Model loading
    // ═══════════════════════════════════════
    const loader = new THREE.GLTFLoader();

    function loadModel(idx) {
      document.getElementById('thumb-img').src = MODELS[idx].img;
      document.getElementById('thumb-img').style.display = 'block';

      if (loadedModels[idx]) {
        swapModel(loadedModels[idx].clone(), idx);
        return;
      }

      // Loading placeholder
      const ph = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0x2a2a3a, wireframe: true })
      );
      swapModel(ph, idx);

      loader.load(MODELS[idx].url, gltf => {
        const m = gltf.scene;
        // Auto-fit
        const box = new THREE.Box3().setFromObject(m);
        const sz = box.getSize(new THREE.Vector3());
        const ctr = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(sz.x, sz.y, sz.z);
        const s = (MODELS[idx].scale * 1.6) / maxDim;
        m.scale.setScalar(s);
        // Bottom-align — гадаргуу дээр тавих
        m.position.set(-ctr.x * s, -box.min.y * s, -ctr.z * s);

        m.traverse(c => {
          if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }
        });

        // AO ring-г model-ийн хэмжээнд тааруулах
        const r = Math.max(sz.x, sz.z) * s * 0.6;
        aoRing.scale.setScalar(r / 0.55);

        loadedModels[idx] = m;
        if (currentIdx === idx) swapModel(m.clone(), idx);
      }, null, err => {
        console.warn('GLB error:', err);
        // Fallback shapes
        const shapes = [
          new THREE.BoxGeometry(0.7, 0.7, 0.7),
          new THREE.SphereGeometry(0.4, 32, 32),
          new THREE.TorusGeometry(0.35, 0.12, 16, 64),
          new THREE.ConeGeometry(0.35, 0.8, 32),
        ];
        const colors = [0xe74c3c, 0x3498db, 0xe67e22, 0x2ecc71];
        const fb = new THREE.Mesh(
          shapes[idx],
          new THREE.MeshStandardMaterial({ color: colors[idx], roughness: 0.35, metalness: 0.4 })
        );
        // Bottom-align fallback
        const box = new THREE.Box3().setFromObject(fb);
        fb.position.y = -box.min.y;
        fb.castShadow = true;
        loadedModels[idx] = fb;
        if (currentIdx === idx) swapModel(fb.clone(), idx);
      });
    }

    function swapModel(mesh, idx) {
      while (pivot.children.length) pivot.remove(pivot.children[0]);
      pivot.add(mesh);
    }

    // ═══════════════════════════════════════
    //  Transform
    // ═══════════════════════════════════════
    function applyTransform() {
      pivot.rotation.y = THREE.MathUtils.degToRad(tr.rotY);
      // X rotation хязгаарлах (гадаргуутай тасарчгүй байх)
      pivot.rotation.x = THREE.MathUtils.degToRad(Math.max(-30, Math.min(30, tr.rotX)));
      pivot.scale.setScalar(tr.scale);

      // Позиц — гадаргуу дээр л хөдлөх (Y тэнхлэг тогтмол)
      surfaceGroup.position.set(tr.posX, 0, tr.posY * 0.5);

      document.getElementById('readout').textContent =
        `↻${tr.rotY.toFixed(0)}°  🔍${tr.scale.toFixed(2)}x`;
    }

    // ═══════════════════════════════════════
    //  Touch
    // ═══════════════════════════════════════
    const tch = { active: false, lx: 0, ly: 0, ldist: 0, lmx: 0, lmy: 0 };

    function d2(a, b) { return Math.sqrt((a.clientX - b.clientX) ** 2 + (a.clientY - b.clientY) ** 2) }
    function m2(a, b) { return { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 } }

    document.getElementById('touch-layer').addEventListener('touchstart', e => {
      tch.active = true; stopAuto();
      if (e.touches.length === 1) { tch.lx = e.touches[0].clientX; tch.ly = e.touches[0].clientY }
      else if (e.touches.length === 2) {
        tch.ldist = d2(e.touches[0], e.touches[1]);
        const m = m2(e.touches[0], e.touches[1]); tch.lmx = m.x; tch.lmy = m.y;
      }
    }, { passive: true });

    document.getElementById('touch-layer').addEventListener('touchmove', e => {
      if (!tch.active || !placed) return;
      e.preventDefault();
      if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - tch.lx, dy = e.touches[0].clientY - tch.ly;
        tr.rotY += dx * 0.5;
        tr.rotX = Math.max(-30, Math.min(30, tr.rotX - dy * 0.3));
        tch.lx = e.touches[0].clientX; tch.ly = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        const dist = d2(e.touches[0], e.touches[1]);
        const mid = m2(e.touches[0], e.touches[1]);
        if (tch.ldist > 0) tr.scale = Math.max(0.15, Math.min(4, tr.scale * (dist / tch.ldist)));
        tr.posX += (mid.x - tch.lmx) * 0.005;
        tr.posY += (mid.y - tch.lmy) * 0.005;
        tch.ldist = dist; tch.lmx = mid.x; tch.lmy = mid.y;
      }
      applyTransform();
    }, { passive: false });

    document.getElementById('touch-layer').addEventListener('touchend', e => {
      if (e.touches.length === 0) tch.active = false;
      if (e.touches.length === 1) { tch.lx = e.touches[0].clientX; tch.ly = e.touches[0].clientY; }
    }, { passive: true });

    // ═══════════════════════════════════════
    //  Auto-rotate
    // ═══════════════════════════════════════
    function startAuto() {
      if (autoRafId) return;
      (function loop() { tr.rotY = (tr.rotY + 0.4) % 360; applyTransform(); autoRafId = requestAnimationFrame(loop) })();
    }
    function stopAuto() {
      if (autoRafId) { cancelAnimationFrame(autoRafId); autoRafId = null; }
      autoOn = false; document.getElementById('auto-btn').classList.remove('on');
    }
    function toggleAuto() {
      if (autoOn) { stopAuto(); }
      else { autoOn = true; document.getElementById('auto-btn').classList.add('on'); startAuto(); }
    }

    // ═══════════════════════════════════════
    //  Reset
    // ═══════════════════════════════════════
    function resetAll() {
      stopAuto();
      tr.rotX = 0; tr.rotY = 0; tr.scale = 1; tr.posX = 0; tr.posY = 0;
      applyTransform();
    }

    // ═══════════════════════════════════════
    //  Switch model
    // ═══════════════════════════════════════
    function switchModel(idx) {
      currentIdx = idx;
      document.querySelectorAll('.model-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
      document.getElementById('info-panel').style.display = 'none';
      infoVisible = false;
      if (placed) loadModel(idx);
    }

    // ═══════════════════════════════════════
    //  Info
    // ═══════════════════════════════════════
    function toggleInfo() {
      infoVisible = !infoVisible;
      const p = document.getElementById('info-panel');
      if (infoVisible) {
        document.getElementById('info-title').textContent = MODELS[currentIdx].name;
        document.getElementById('info-desc').textContent = MODELS[currentIdx].desc;
        p.style.display = 'block';
      } else p.style.display = 'none';
    }

    // ═══════════════════════════════════════
    //  Grid canvas animation (scan phase)
    // ═══════════════════════════════════════
    const gc = document.getElementById('grid-canvas');
    const gctx = gc.getContext('2d');
    gc.width = window.innerWidth;
    gc.height = window.innerHeight;

    let gridOffset = 0;
    function drawGrid() {
      if (placed) return;
      gctx.clearRect(0, 0, gc.width, gc.height);
      gridOffset = (gridOffset + 0.4) % 40;

      const alpha = Math.min(0.25, confidence * 0.005);
      gctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      gctx.lineWidth = 0.5;

      // Perspective grid
      const vp = { x: gc.width / 2, y: gc.height * 0.55 };
      const rows = 10, cols = 14;
      const spacing = 40;

      for (let r = 0; r <= rows; r++) {
        const y = vp.y + (r * spacing + gridOffset);
        if (y > gc.height) continue;
        const t = (y - vp.y) / (gc.height - vp.y);
        const x0 = vp.x - t * gc.width * 0.6;
        const x1 = vp.x + t * gc.width * 0.6;
        gctx.beginPath(); gctx.moveTo(x0, y); gctx.lineTo(x1, y); gctx.stroke();
      }
      for (let c = -cols; c <= cols; c++) {
        gctx.beginPath();
        gctx.moveTo(vp.x, vp.y);
        gctx.lineTo(vp.x + c * (gc.width / cols), gc.height);
        gctx.stroke();
      }
      requestAnimationFrame(drawGrid);
    }
    drawGrid();

    // ═══════════════════════════════════════
    //  Render loop
    // ═══════════════════════════════════════
    function animate() {
      requestAnimationFrame(animate);
      updateCameraFromGyro();
      renderer.render(scene, camera);
    }

    // ═══════════════════════════════════════
    //  Resize
    // ═══════════════════════════════════════
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      gc.width = window.innerWidth; gc.height = window.innerHeight;
    });

    // ═══════════════════════════════════════
    //  Init
    // ═══════════════════════════════════════
    async function init() {
      const ok = await startCamera();
      document.getElementById('loading').classList.add('fade');
      setTimeout(() => document.getElementById('loading').style.display = 'none', 700);

      startGyro();
      applyTransform();
      animate();

      // Gyro байхгүй хөтөч (desktop) → 3 секундын дараа автоматаар place хийх
      if (!('DeviceOrientationEvent' in window)) {
        setTimeout(placeSurface, 2000);
      }
    }

    init();
  </script>
</body>

</html>
