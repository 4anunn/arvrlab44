<!DOCTYPE html>
<html lang="mn">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="UTF-8"/>
  <title>AR — Touch Control</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #000; font-family: 'Helvetica Neue', sans-serif; overflow: hidden; touch-action: none; }

    /* ── Scan overlay ── */
    #scan-overlay {
      position: fixed; inset: 0; z-index: 100;
      pointer-events: none;
      transition: opacity 0.6s;
    }
    #reticle-wrap {
      position: absolute; left: 50%; top: 52%;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .reticle-ring {
      width: 160px; height: 56px;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: ring-pulse 2s ease-in-out infinite;
      position: relative;
    }
    .reticle-ring::before, .reticle-ring::after {
      content: ''; position: absolute;
      width: 12px; height: 1.5px; background: rgba(255,255,255,0.6);
    }
    .reticle-ring::before { left: -16px; }
    .reticle-ring::after  { right: -16px; }
    .reticle-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; }
    @keyframes ring-pulse {
      0%,100% { transform: scaleX(1) scaleY(1); opacity: 0.6; }
      50%      { transform: scaleX(1.1) scaleY(1.2); opacity: 1; }
    }
    #scan-label {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 0.6rem;
      color: #fff;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: blink 1.4s ease-in-out infinite;
    }
    #scan-sub { font-size: 0.62rem; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.6; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .corner { position: absolute; width: 36px; height: 36px; border-color: rgba(255,255,255,0.4); border-style: solid; }
    .c-tl { top:16px; left:16px; border-width:2px 0 0 2px; }
    .c-tr { top:16px; right:16px; border-width:2px 2px 0 0; }
    .c-bl { bottom:100px; left:16px; border-width:0 0 2px 2px; }
    .c-br { bottom:100px; right:16px; border-width:0 2px 2px 0; }

    /* ── Touch hint (marker олдоод гарах) ── */
    #touch-hint {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      z-index: 200;
      display: none;
      flex-direction: column; align-items: center; gap: 12px;
      pointer-events: none;
      animation: fadeOut 0.4s ease 2.5s forwards;
    }
    #touch-hint.show { display: flex; }
    @keyframes fadeOut { to { opacity: 0; } }
    .hint-icons { display: flex; gap: 20px; }
    .hint-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .hint-icon { font-size: 1.6rem; }
    .hint-text { font-size: 0.55rem; color: rgba(255,255,255,0.7); letter-spacing: 0.08em; }
    .hint-bg {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 16px 24px;
    }

    /* ── Found toast ── */
    #found-toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-70px);
      z-index: 200;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 99px;
      padding: 9px 18px;
      display: flex; align-items: center; gap: 8px;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }
    #found-toast.show { transform: translateX(-50%) translateY(0); }
    .toast-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; }
    #found-toast span { color: #fff; font-size: 0.65rem; letter-spacing: 0.07em; }

    /* ── Controls ── */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
      padding: 0 14px 28px;
      background: linear-gradient(0deg, rgba(0,0,0,0.82) 0%, transparent 100%);
    }
    #model-tabs {
      display: flex; gap: 7px; justify-content: center; margin-bottom: 10px;
    }
    .model-tab {
      flex: 1; max-width: 80px;
      padding: 7px 0;
      border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.65);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      backdrop-filter: blur(6px);
      text-align: center;
    }
    .model-tab.active { background: #fff; color: #000; border-color: #fff; font-weight: 700; }

    #action-row { display: flex; gap: 8px; justify-content: center; }
    .ctrl-btn {
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.8);
      font-size: 0.65rem;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .ctrl-btn.on { background: rgba(250,204,21,0.18); border-color: rgba(250,204,21,0.55); color: #facc15; }

    /* ── Thumbnail ── */
    #thumb-img {
      position: fixed; bottom: 120px; right: 14px;
      width: 68px; height: 68px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.25);
      object-fit: cover;
      display: none; z-index: 150;
      cursor: pointer;
    }

    /* ── Info panel ── */
    #info-panel {
      position: fixed; bottom: 185px; left: 14px; right: 14px;
      z-index: 160;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 14px;
      padding: 13px 15px;
      display: none;
    }
    #info-panel h3 { color: #facc15; font-size: 0.82rem; margin-bottom: 5px; }
    #info-panel p  { color: rgba(255,255,255,0.6); font-size: 0.62rem; line-height: 1.6; }

    /* ── Transform readout (debug) ── */
    #readout {
      position: fixed; top: 56px; left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 0.58rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.06em;
      pointer-events: none;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

<!-- Scan overlay -->
<div id="scan-overlay">
  <div class="corner c-tl"></div><div class="corner c-tr"></div>
  <div class="corner c-bl"></div><div class="corner c-br"></div>
  <div id="reticle-wrap">
    <div class="reticle-ring"><div class="reticle-dot"></div></div>
    <div id="scan-label">Marker хайж байна</div>
    <div id="scan-sub">Marker зургийг камерт харуулна уу</div>
  </div>
</div>

<!-- Touch hint -->
<div id="touch-hint">
  <div class="hint-bg">
    <div class="hint-icons">
      <div class="hint-item">
        <div class="hint-icon">☝️</div>
        <div class="hint-text">DRAG<br/>Эргүүлэх</div>
      </div>
      <div class="hint-item">
        <div class="hint-icon">🤏</div>
        <div class="hint-text">PINCH<br/>Томруулах</div>
      </div>
      <div class="hint-item">
        <div class="hint-icon">✌️</div>
        <div class="hint-text">2-DRAG<br/>Шилжүүлэх</div>
      </div>
    </div>
  </div>
</div>

<!-- Found toast -->
<div id="found-toast"><div class="toast-dot"></div><span id="toast-msg">Marker олдлоо</span></div>

<!-- Readout -->
<div id="readout" id="readout">↕ drag · pinch zoom</div>

<!-- Thumbnail -->
<img id="thumb-img" src="" onclick="toggleInfo()"/>

<!-- Info panel -->
<div id="info-panel">
  <h3 id="info-title"></h3>
  <p id="info-desc"></p>
</div>

<!-- Controls -->
<div id="controls">
  <div id="model-tabs">
    <button class="model-tab active" onclick="showModel(1)">1</button>
    <button class="model-tab" onclick="showModel(2)">2</button>
    <button class="model-tab" onclick="showModel(3)">3</button>
    <button class="model-tab" onclick="showModel(4)">4</button>
  </div>
  <div id="action-row">
    <button class="ctrl-btn" id="auto-rotate-btn" onclick="toggleAutoRotate()">⟳ Автo</button>
    <button class="ctrl-btn" id="reset-btn" onclick="resetTransform()">↺ Reset</button>
  </div>
</div>

<!-- ═══════════ A-FRAME ═══════════ -->
<a-scene
  mindar-image="imageTargetSrc: targets6.mind; warmupTolerance:1; missTolerance:5;"
  color-space="sRGB"
  renderer="colorManagement:true; physicallyCorrectLights:true; antialias:true;"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
>
  <a-assets>
    <a-asset-item id="model1" src="assets/bee-gltf/4.glb"></a-asset-item>
    <a-asset-item id="model2" src="assets/bee-gltf/7.glb"></a-asset-item>
    <a-asset-item id="model3" src="assets/bee-gltf/sudas.glb"></a-asset-item>
    <a-asset-item id="model4" src="assets/bee-gltf/bulchin.glb"></a-asset-item>
  </a-assets>

  <a-light type="ambient"     color="#fff" intensity="0.55"></a-light>
  <a-light type="directional" color="#ffe8cc" intensity="1.3" position="1 3 2" cast-shadow="true"></a-light>
  <a-light type="point"       color="#cce0ff" intensity="0.4" position="-1 2 -1"></a-light>

  <a-camera position="0 0 0" look-controls="enabled:false">
    <a-cursor fuse="false" raycaster="objects:.clickable"></a-cursor>
  </a-camera>

  <a-entity mindar-image-target="targetIndex:0" id="targetEntity">

    <!-- Pivot: touch control энд хэрэглэгдэнэ -->
    <a-entity id="pivot" position="0 0 0">

      <a-gltf-model id="gltf1" src="#model1" position="0 0 0.3" scale="0.005 0.005 0.005" visible="false"></a-gltf-model>
      <a-gltf-model id="gltf2" src="#model2" position="0 0 0.3" scale="0.005 0.005 0.005" visible="false"></a-gltf-model>
      <a-gltf-model id="gltf3" src="#model3" position="0 0 0.3" scale="0.005 0.005 0.005" visible="false"></a-gltf-model>
      <a-gltf-model id="gltf4" src="#model4" position="0 0 0.3" scale="0.005 0.005 0.005" visible="false"></a-gltf-model>

    </a-entity>

    <!-- Shadow plane -->
    <a-plane rotation="-90 0 0" width="2" height="2"
      color="#000" opacity="0.18"
      material="transparent:true; depthWrite:false">
    </a-plane>

  </a-entity>
</a-scene>

<script>
// ═══════════════════════════════════════════════
//  Data
// ═══════════════════════════════════════════════
const MODEL_DATA = [
  { name:"Хүний бие",     desc:"Хүний биеийн бүтэц, эрхтэн тогтолцоо",          img:"assets/1.jpg" },
  { name:"Яс",            desc:"Аrag ясны тогтолцоо, холбоос, үений бүтэц",      img:"assets/2.jpg" },
  { name:"Цусан хангамж", desc:"Судасны систем, зүрх, цусны эргэлт",             img:"assets/4.jpg" },
  { name:"Булчин",        desc:"Булчингийн бүлгүүд, хөдөлгөөний механизм",       img:"assets/3.jpg" },
];

// ═══════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════
let markerActive  = false;
let currentIdx    = 1;
let autoRotating  = false;
let infoVisible   = false;

// Transform state
const transform = {
  rotX: 0, rotY: 0,          // drag-аар эргүүлэх
  scale: 1,                  // pinch-аар томруулах
  posX: 0, posY: 0           // 2-finger drag-аар шилжүүлэх
};

// Base scale нь model-ийн анхны scale (0.005)
const BASE_SCALE = 0.005;
const MIN_SCALE  = 0.3;
const MAX_SCALE  = 3.5;

// ═══════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════
const targetEl     = document.querySelector('#targetEntity');
const pivot        = document.querySelector('#pivot');
const models       = [1,2,3,4].map(i => document.querySelector(`#gltf${i}`));
const scanOverlay  = document.querySelector('#scan-overlay');
const foundToast   = document.querySelector('#found-toast');
const touchHint    = document.querySelector('#touch-hint');
const thumbImg     = document.querySelector('#thumb-img');
const infoPanel    = document.querySelector('#info-panel');
const autoRotBtn   = document.querySelector('#auto-rotate-btn');
const readout      = document.querySelector('#readout');

// ═══════════════════════════════════════════════
//  Marker events
// ═══════════════════════════════════════════════
targetEl.addEventListener('targetFound', () => {
  markerActive = true;
  scanOverlay.style.opacity = '0';
  scanOverlay.style.pointerEvents = 'none';

  showToast('✦ Marker олдлоо — touch-аар удирдана уу');
  showTouchHint();
  showCurrentModel();
});

targetEl.addEventListener('targetLost', () => {
  markerActive = false;
  scanOverlay.style.opacity = '1';
  models.forEach(m => m.setAttribute('visible','false'));
  stopAutoRotate();
});

// ═══════════════════════════════════════════════
//  Model switching
// ═══════════════════════════════════════════════
function showModel(idx) {
  currentIdx = idx;
  document.querySelectorAll('.model-tab').forEach((t,i) => t.classList.toggle('active', i===idx-1));
  thumbImg.src = MODEL_DATA[idx-1].img;
  thumbImg.style.display = 'block';
  infoPanel.style.display = 'none';
  infoVisible = false;

  if (markerActive) showCurrentModel();
}

function showCurrentModel() {
  models.forEach((m,i) => m.setAttribute('visible', i===currentIdx-1 ? 'true' : 'false'));
  applyTransform();
}

// ═══════════════════════════════════════════════
//  Transform → A-Frame entity-д шууд тохируулах
// ═══════════════════════════════════════════════
function applyTransform() {
  const s = BASE_SCALE * transform.scale;
  const activeModel = models[currentIdx - 1];

  // Pivot-ийн rotation (drag-аар)
  pivot.setAttribute('rotation', {
    x: transform.rotX,
    y: transform.rotY,
    z: 0
  });

  // Pivot position (2-finger pan)
  pivot.setAttribute('position', {
    x: transform.posX,
    y: transform.posY,
    z: 0
  });

  // Scale нь model дээрээ
  models.forEach((m, i) => {
    m.setAttribute('scale', `${s} ${s} ${s}`);
  });

  // Readout шинэчлэх
  readout.textContent =
    `↻${transform.rotY.toFixed(0)}°  ↕${transform.rotX.toFixed(0)}°  🔍${transform.scale.toFixed(2)}x`;
}

// ═══════════════════════════════════════════════
//  Touch handlers
// ═══════════════════════════════════════════════
let touch = {
  active: false,
  lastX: 0, lastY: 0,
  // pinch
  lastDist: 0,
  // 2-finger pan
  lastMidX: 0, lastMidY: 0,
};

const canvas = document.querySelector('canvas') || document.body;

function getTouchDist(t1, t2) {
  const dx = t1.clientX - t2.clientX;
  const dy = t1.clientY - t2.clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

function getTouchMid(t1, t2) {
  return {
    x: (t1.clientX + t2.clientX) / 2,
    y: (t1.clientY + t2.clientY) / 2
  };
}

document.addEventListener('touchstart', e => {
  // Controls дээр байвал skip
  if (e.target.closest('#controls, #thumb-img, #info-panel, #found-toast')) return;

  touch.active = true;
  stopAutoRotate();

  if (e.touches.length === 1) {
    touch.lastX = e.touches[0].clientX;
    touch.lastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    touch.lastDist = getTouchDist(e.touches[0], e.touches[1]);
    const mid = getTouchMid(e.touches[0], e.touches[1]);
    touch.lastMidX = mid.x;
    touch.lastMidY = mid.y;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!touch.active || !markerActive) return;
  if (e.target.closest('#controls, #thumb-img, #info-panel')) return;

  e.preventDefault();

  if (e.touches.length === 1) {
    // ── Single finger → ROTATE ──
    const dx = e.touches[0].clientX - touch.lastX;
    const dy = e.touches[0].clientY - touch.lastY;

    transform.rotY += dx * 0.45;   // horizontal drag → Y эргэлт
    transform.rotX -= dy * 0.45;   // vertical drag   → X эргэлт

    // X rotation хязгаар (-80° ~ 80°)
    transform.rotX = Math.max(-80, Math.min(80, transform.rotX));

    touch.lastX = e.touches[0].clientX;
    touch.lastY = e.touches[0].clientY;

  } else if (e.touches.length === 2) {
    // ── Two fingers → PINCH zoom + PAN ──
    const dist = getTouchDist(e.touches[0], e.touches[1]);
    const mid  = getTouchMid(e.touches[0], e.touches[1]);

    // Pinch scale
    if (touch.lastDist > 0) {
      const ratio = dist / touch.lastDist;
      transform.scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, transform.scale * ratio));
    }

    // 2-finger pan (шилжүүлэх)
    const panX = (mid.x - touch.lastMidX) * 0.003;
    const panY = -(mid.y - touch.lastMidY) * 0.003;
    transform.posX += panX;
    transform.posY += panY;

    touch.lastDist = dist;
    touch.lastMidX = mid.x;
    touch.lastMidY = mid.y;
  }

  applyTransform();
}, { passive: false });

document.addEventListener('touchend', e => {
  if (e.touches.length === 0) touch.active = false;
  if (e.touches.length === 1) {
    touch.lastX = e.touches[0].clientX;
    touch.lastY = e.touches[0].clientY;
  }
}, { passive: true });

// ═══════════════════════════════════════════════
//  Auto-rotate (JS RAF — touch-тай зэрэгцэх)
// ═══════════════════════════════════════════════
let rafId = null;

function startAutoRotate() {
  if (rafId) return;
  function step() {
    transform.rotY = (transform.rotY + 0.5) % 360;
    applyTransform();
    rafId = requestAnimationFrame(step);
  }
  rafId = requestAnimationFrame(step);
}

function stopAutoRotate() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  autoRotating = false;
  autoRotBtn.classList.remove('on');
}

function toggleAutoRotate() {
  if (autoRotating) {
    stopAutoRotate();
  } else {
    autoRotating = true;
    autoRotBtn.classList.add('on');
    startAutoRotate();
  }
}

// ═══════════════════════════════════════════════
//  Reset
// ═══════════════════════════════════════════════
function resetTransform() {
  stopAutoRotate();
  transform.rotX = 0; transform.rotY = 0;
  transform.scale = 1;
  transform.posX = 0; transform.posY = 0;
  applyTransform();
}

// ═══════════════════════════════════════════════
//  Info panel
// ═══════════════════════════════════════════════
function toggleInfo() {
  const d = MODEL_DATA[currentIdx - 1];
  infoVisible = !infoVisible;
  if (infoVisible) {
    document.querySelector('#info-title').textContent = d.name;
    document.querySelector('#info-desc').textContent  = d.desc;
    infoPanel.style.display = 'block';
  } else {
    infoPanel.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════════
function showToast(msg) {
  document.querySelector('#toast-msg').textContent = msg;
  foundToast.classList.add('show');
  setTimeout(() => foundToast.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════
//  Touch hint (marker олдоод нэг удаа харуулах)
// ═══════════════════════════════════════════════
let hintShown = false;
function showTouchHint() {
  if (hintShown) return;
  hintShown = true;
  touchHint.classList.add('show');
  setTimeout(() => touchHint.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════
window.addEventListener('load', () => showModel(1));
</script>
</body>
</html>
