<!DOCTYPE html>
<html lang="mn">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <meta charset="UTF-8"/>
  <title>AR — Marker-гүй</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; touch-action:none; }

    /* Camera feed */
    #video {
      position:fixed; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      transform:scaleX(-1); /* selfie mirror */
    }

    /* Three.js canvas — камер дээр */
    #three-canvas {
      position:fixed; inset:0;
      width:100%; height:100%;
      pointer-events:none;
    }

    /* Touch layer */
    #touch-layer {
      position:fixed; inset:0;
      z-index:10;
    }

    /* ── Loading screen ── */
    #loading {
      position:fixed; inset:0; z-index:200;
      background:#000;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      transition:opacity 0.6s;
    }
    #loading.fade { opacity:0; pointer-events:none; }
    .load-ring {
      width:52px; height:52px;
      border:2px solid rgba(255,255,255,0.1);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loading p { font-family:'Helvetica Neue',sans-serif; font-size:0.7rem; color:rgba(255,255,255,0.5); letter-spacing:0.12em; }

    /* ── UI ── */
    #ui { position:fixed; inset:0; z-index:20; pointer-events:none; }

    /* Top status */
    #top-bar {
      position:absolute; top:16px; left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:99px;
      padding:7px 16px;
      display:flex; align-items:center; gap:8px;
      pointer-events:none;
    }
    .live-dot {
      width:7px; height:7px; border-radius:50%;
      background:#4ade80; box-shadow:0 0 8px #4ade80;
      animation:live-pulse 2s ease-in-out infinite;
    }
    @keyframes live-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #top-bar span { font-family:'Helvetica Neue',sans-serif; font-size:0.62rem; color:#fff; letter-spacing:0.07em; }

    /* Readout */
    #readout {
      position:absolute; top:56px; left:50%;
      transform:translateX(-50%);
      font-family:'Courier New',monospace;
      font-size:0.55rem; color:rgba(255,255,255,0.4);
      letter-spacing:0.06em; white-space:nowrap;
      pointer-events:none;
    }

    /* Touch hint */
    #touch-hint {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      display:none; flex-direction:column; align-items:center;
      pointer-events:none;
    }
    #touch-hint.show { display:flex; animation:fadeOut2 0.5s ease 2.8s forwards; }
    @keyframes fadeOut2 { to{opacity:0} }
    .hint-bg {
      background:rgba(0,0,0,0.65); backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.13);
      border-radius:16px; padding:16px 22px;
      display:flex; gap:22px;
    }
    .hint-item { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .hint-icon { font-size:1.4rem; }
    .hint-txt { font-family:'Helvetica Neue',sans-serif; font-size:0.5rem; color:rgba(255,255,255,0.6); letter-spacing:0.07em; text-align:center; }

    /* Bottom controls */
    #controls {
      position:absolute; bottom:0; left:0; right:0;
      padding:0 14px 32px;
      background:linear-gradient(0deg,rgba(0,0,0,0.8) 0%,transparent 100%);
      pointer-events:all;
    }

    #model-tabs { display:flex; gap:7px; justify-content:center; margin-bottom:10px; }
    .model-tab {
      flex:1; max-width:80px; padding:8px 0; text-align:center;
      border-radius:99px;
      border:1px solid rgba(255,255,255,0.2);
      background:rgba(255,255,255,0.07);
      color:rgba(255,255,255,0.6);
      font-family:'Helvetica Neue',sans-serif;
      font-size:0.65rem; cursor:pointer;
      transition:all 0.2s; backdrop-filter:blur(6px);
    }
    .model-tab.active { background:#fff; color:#000; border-color:#fff; font-weight:700; }

    #action-row { display:flex; gap:8px; justify-content:center; }
    .ctrl-btn {
      padding:9px 18px; border-radius:10px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.08);
      color:rgba(255,255,255,0.85);
      font-family:'Helvetica Neue',sans-serif;
      font-size:0.65rem; cursor:pointer;
      backdrop-filter:blur(6px); transition:all 0.2s; letter-spacing:0.04em;
    }
    .ctrl-btn.on { background:rgba(250,204,21,0.18); border-color:rgba(250,204,21,0.5); color:#facc15; }

    /* Thumbnail + info */
    #thumb-img {
      position:absolute; bottom:120px; right:14px;
      width:68px; height:68px; border-radius:10px;
      border:2px solid rgba(255,255,255,0.25);
      object-fit:cover; display:none;
      cursor:pointer; pointer-events:all;
    }
    #info-panel {
      position:absolute; bottom:190px; left:14px; right:14px;
      background:rgba(0,0,0,0.72); backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:14px; padding:13px 15px; display:none;
    }
    #info-panel h3 { color:#facc15; font-family:'Helvetica Neue',sans-serif; font-size:0.82rem; margin-bottom:5px; }
    #info-panel p  { color:rgba(255,255,255,0.6); font-family:'Helvetica Neue',sans-serif; font-size:0.62rem; line-height:1.6; }
  </style>
</head>
<body>

<!-- Camera -->
<video id="video" autoplay playsinline muted></video>

<!-- Three.js -->
<canvas id="three-canvas"></canvas>

<!-- Touch -->
<div id="touch-layer"></div>

<!-- Loading -->
<div id="loading">
  <div class="load-ring"></div>
  <p>Камер нээж байна…</p>
</div>

<!-- UI -->
<div id="ui">
  <div id="top-bar">
    <div class="live-dot"></div>
    <span id="top-label">AR горим — marker хэрэггүй</span>
  </div>
  <div id="readout"></div>

  <div id="touch-hint">
    <div class="hint-bg">
      <div class="hint-item"><div class="hint-icon">☝️</div><div class="hint-txt">DRAG<br/>Эргүүлэх</div></div>
      <div class="hint-item"><div class="hint-icon">🤏</div><div class="hint-txt">PINCH<br/>Zoom</div></div>
      <div class="hint-item"><div class="hint-icon">✌️</div><div class="hint-txt">2-DRAG<br/>Шилжүүлэх</div></div>
    </div>
  </div>

  <img id="thumb-img" src="" onclick="toggleInfo()"/>
  <div id="info-panel">
    <h3 id="info-title"></h3>
    <p id="info-desc"></p>
  </div>

  <div id="controls">
    <div id="model-tabs">
      <button class="model-tab active" onclick="switchModel(0)">1</button>
      <button class="model-tab"        onclick="switchModel(1)">2</button>
      <button class="model-tab"        onclick="switchModel(2)">3</button>
      <button class="model-tab"        onclick="switchModel(3)">4</button>
    </div>
    <div id="action-row">
      <button class="ctrl-btn" id="auto-btn"  onclick="toggleAuto()">⟳ Авто</button>
      <button class="ctrl-btn" id="reset-btn" onclick="resetTransform()">↺ Reset</button>
    </div>
  </div>
</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- GLTFLoader -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ═══════════════════════════════════════════════
//  Config — өөрийн model замуудыг энд тохируулна
// ═══════════════════════════════════════════════
const MODELS = [
  { url:'assets/bee-gltf/dotood.glb', name:'Хүний бие',     desc:'Хүний биеийн бүтэц, эрхтэн тогтолцоо',       img:'assets/1.jpg', scale:0.5 },
  { url:'assets/bee-gltf/4.glb',      name:'Яс',            desc:'Аrag ясны тогтолцоо, холбоос, үений бүтэц',   img:'assets/2.jpg', scale:0.5 },
  { url:'assets/bee-gltf/5.glb',      name:'Цусан хангамж', desc:'Судасны систем, зүрх, цусны эргэлт',          img:'assets/4.jpg', scale:0.5 },
  { url:'assets/bee-gltf/6.glb',      name:'Булчин',        desc:'Булчингийн бүлгүүд, хөдөлгөөний механизм',    img:'assets/3.jpg', scale:0.5 },
];

// ═══════════════════════════════════════════════
//  Three.js setup
// ═══════════════════════════════════════════════
const canvas   = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100);
camera.position.set(0, 0, 3);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffe8cc, 1.4);
dirLight.position.set(2, 4, 3);
dirLight.castShadow = true;
scene.add(dirLight);

const fillLight = new THREE.PointLight(0xccddff, 0.5);
fillLight.position.set(-2, 2, -1);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
rimLight.position.set(0, -2, -3);
scene.add(rimLight);

// Shadow plane (model доор)
const shadowGeo = new THREE.PlaneGeometry(4, 4);
const shadowMat = new THREE.ShadowMaterial({ opacity:0.2 });
const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
shadowPlane.rotation.x = -Math.PI / 2;
shadowPlane.position.y = -1;
shadowPlane.receiveShadow = true;
scene.add(shadowPlane);

// Pivot group
const pivot = new THREE.Group();
scene.add(pivot);

// ═══════════════════════════════════════════════
//  Camera stream
// ═══════════════════════════════════════════════
async function startCamera() {
  const video = document.getElementById('video');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  } catch(e) {
    // Арын камер байхгүй бол урд камер
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
      document.getElementById('video').srcObject = stream;
      await document.getElementById('video').play();
      // Урд камер бол mirror засах
      video.style.transform = 'scaleX(1)';
    } catch(e2) {
      document.getElementById('loading').querySelector('p').textContent = 'Камер нээгдсэнгүй';
    }
  }
}

// ═══════════════════════════════════════════════
//  GLTF Loader
// ═══════════════════════════════════════════════
const loader = new THREE.GLTFLoader();
let currentMesh = null;
let currentModelIdx = 0;
const loadedModels = {};   // cache

function loadModel(idx) {
  const cfg = MODELS[idx];

  // Cache байвал шууд харуулах
  if (loadedModels[idx]) {
    swapMesh(loadedModels[idx].clone(), idx);
    return;
  }

  // Placeholder sphere (loading байхад)
  const ph = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 16, 16),
    new THREE.MeshStandardMaterial({ color:0x333344, wireframe:true })
  );
  swapMesh(ph, idx);

  loader.load(
    cfg.url,
    (gltf) => {
      const model = gltf.scene;

      // Auto-center + scale
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const targetSize = cfg.scale * 2;
      model.scale.setScalar(targetSize / maxDim);
      model.position.sub(center.multiplyScalar(targetSize / maxDim));

      // Shadow
      model.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      loadedModels[idx] = model;

      if (currentModelIdx === idx) {
        swapMesh(model.clone(), idx);
      }
    },
    null,
    (err) => {
      console.warn('GLB load error:', err);
      // Fallback: тухайн model-д тохирсон өнгөт хайрцаг
      const colors = [0xe74c3c, 0x3498db, 0xe67e22, 0x2ecc71];
      const fb = new THREE.Mesh(
        new THREE.BoxGeometry(0.8,0.8,0.8),
        new THREE.MeshStandardMaterial({ color:colors[idx], roughness:0.4, metalness:0.3 })
      );
      loadedModels[idx] = fb;
      if (currentModelIdx === idx) swapMesh(fb.clone(), idx);
    }
  );
}

function swapMesh(mesh, idx) {
  // Өмнөх mesh устгах
  while (pivot.children.length) pivot.remove(pivot.children[0]);

  pivot.add(mesh);
  currentMesh = mesh;

  // Thumbnail
  const thumbImg = document.getElementById('thumb-img');
  thumbImg.src = MODELS[idx].img;
  thumbImg.style.display = 'block';
}

// ═══════════════════════════════════════════════
//  Transform state
// ═══════════════════════════════════════════════
const tr = { rotX:0, rotY:0, scale:1, posX:0, posY:0 };

function applyTransform() {
  pivot.rotation.x = THREE.MathUtils.degToRad(tr.rotX);
  pivot.rotation.y = THREE.MathUtils.degToRad(tr.rotY);
  pivot.scale.setScalar(tr.scale);
  pivot.position.set(tr.posX, tr.posY, 0);

  document.getElementById('readout').textContent =
    `↻${tr.rotY.toFixed(0)}°  ↕${tr.rotX.toFixed(0)}°  🔍${tr.scale.toFixed(2)}x`;
}

// ═══════════════════════════════════════════════
//  Touch handlers
// ═══════════════════════════════════════════════
const tch = { active:false, lastX:0, lastY:0, lastDist:0, lastMidX:0, lastMidY:0 };

function dist2(t1,t2) {
  return Math.sqrt((t1.clientX-t2.clientX)**2+(t1.clientY-t2.clientY)**2);
}
function mid2(t1,t2) {
  return {x:(t1.clientX+t2.clientX)/2, y:(t1.clientY+t2.clientY)/2};
}

const touchLayer = document.getElementById('touch-layer');

touchLayer.addEventListener('touchstart', e => {
  tch.active = true;
  stopAuto();
  if (e.touches.length===1) {
    tch.lastX=e.touches[0].clientX; tch.lastY=e.touches[0].clientY;
  } else if (e.touches.length===2) {
    tch.lastDist = dist2(e.touches[0],e.touches[1]);
    const m = mid2(e.touches[0],e.touches[1]);
    tch.lastMidX=m.x; tch.lastMidY=m.y;
  }
}, {passive:true});

touchLayer.addEventListener('touchmove', e => {
  if (!tch.active) return;
  e.preventDefault();

  if (e.touches.length===1) {
    const dx = e.touches[0].clientX - tch.lastX;
    const dy = e.touches[0].clientY - tch.lastY;
    tr.rotY += dx * 0.5;
    tr.rotX  = Math.max(-85, Math.min(85, tr.rotX - dy * 0.5));
    tch.lastX=e.touches[0].clientX; tch.lastY=e.touches[0].clientY;
  } else if (e.touches.length===2) {
    const d = dist2(e.touches[0],e.touches[1]);
    const m = mid2(e.touches[0],e.touches[1]);
    if (tch.lastDist>0) {
      tr.scale = Math.max(0.2, Math.min(4, tr.scale * (d/tch.lastDist)));
    }
    tr.posX += (m.x - tch.lastMidX) * 0.004;
    tr.posY -= (m.y - tch.lastMidY) * 0.004;
    tch.lastDist=d; tch.lastMidX=m.x; tch.lastMidY=m.y;
  }
  applyTransform();
}, {passive:false});

touchLayer.addEventListener('touchend', e => {
  if (e.touches.length===0) tch.active=false;
  if (e.touches.length===1) { tch.lastX=e.touches[0].clientX; tch.lastY=e.touches[0].clientY; }
}, {passive:true});

// ═══════════════════════════════════════════════
//  Auto-rotate
// ═══════════════════════════════════════════════
let autoRaf = null;
let autoOn  = false;

function startAuto() {
  if (autoRaf) return;
  function loop() {
    tr.rotY = (tr.rotY + 0.4) % 360;
    applyTransform();
    autoRaf = requestAnimationFrame(loop);
  }
  autoRaf = requestAnimationFrame(loop);
}
function stopAuto() {
  if (autoRaf) { cancelAnimationFrame(autoRaf); autoRaf=null; }
  autoOn = false;
  document.getElementById('auto-btn').classList.remove('on');
}
function toggleAuto() {
  if (autoOn) { stopAuto(); }
  else { autoOn=true; document.getElementById('auto-btn').classList.add('on'); startAuto(); }
}

// ═══════════════════════════════════════════════
//  Reset
// ═══════════════════════════════════════════════
function resetTransform() {
  stopAuto();
  tr.rotX=0; tr.rotY=0; tr.scale=1; tr.posX=0; tr.posY=0;
  applyTransform();
}

// ═══════════════════════════════════════════════
//  Model switch
// ═══════════════════════════════════════════════
function switchModel(idx) {
  currentModelIdx = idx;
  document.querySelectorAll('.model-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.getElementById('info-panel').style.display = 'none';
  infoVisible = false;
  loadModel(idx);
}

// ═══════════════════════════════════════════════
//  Info
// ═══════════════════════════════════════════════
let infoVisible = false;
function toggleInfo() {
  const d = MODELS[currentModelIdx];
  infoVisible = !infoVisible;
  const panel = document.getElementById('info-panel');
  if (infoVisible) {
    document.getElementById('info-title').textContent = d.name;
    document.getElementById('info-desc').textContent  = d.desc;
    panel.style.display = 'block';
  } else {
    panel.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════
//  Render loop
// ═══════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════
//  Resize
// ═══════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════
async function init() {
  await startCamera();

  // Loading нуух
  const loading = document.getElementById('loading');
  loading.classList.add('fade');
  setTimeout(() => loading.style.display='none', 700);

  // Touch hint
  const hint = document.getElementById('touch-hint');
  hint.classList.add('show');
  setTimeout(() => hint.classList.remove('show'), 3200);

  // Анхны model ачаалах
  loadModel(0);
  applyTransform();
  animate();
}

init();
</script>
</body>
</html>
